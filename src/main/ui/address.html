<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>客户地址管理</title>
    <link rel="stylesheet" href="address.css">
</head>
<body>
    <div class="container">
        <h1>客户地址管理</h1>
        <!-- 查询区域 -->
        <div class="search-bar">
            <div class="search-bar-row">
                <label>客户号</label>
                <input type="text" id="clientNoInput" placeholder="请输入客户号">
                <button id="queryBtn">查询</button>
            </div>
            <button id="addBtn">新增地址</button>
        </div>
        <!-- 地址列表 -->
        <table id="addressTable">
            <thead>
                <tr>
                    <th>序号</th>
                    <th>地址类型</th>
                    <th>地址详情</th>
                    <th>修改日期</th>
                    <th>通讯地址</th>
                    <th>最新地址</th>
                    <th>操作</th>
                </tr>
            </thead>
            <tbody id="addressTableBody">
            </tbody>
        </table>
        <!-- 分页 -->
        <div class="pagination">
            <span id="pageInfo"></span>
            <select id="pageSizeSelect">
                <option value="5">5条/页</option>
                <option value="5" selected>5条/页</option>
                <option value="10">10条/页</option>
                <option value="20">20条/页</option>
                <option value="50">50条/页</option>
            </select>
            <button id="prevBtn">上一页</button>
            <button id="nextBtn">下一页</button>
        </div>
    </div>
    <!-- 弹窗 -->
    <div id="addressModal" class="modal">
        <div class="modal-content">
            <h2 id="modalTitle">新增地址</h2>
            <form id="addressForm">
                <input type="hidden" id="seqNo">
                <div class="form-row">
                    <label>地址类型:</label>
                    <select id="addressType">
                        <option value="01">其他地址</option>
                        <option value="02">联系地址</option>
                        <option value="03">居住地址</option>
                        <option value="04">单位地址</option>
                        <option value="05">户籍地址</option>
                        <option value="06">证件地址</option>
                        <option value="07">营业地址</option>
                        <option value="08">注册地址</option>
                        <option value="09">办公地址</option>
                        <option value="10">永久地址</option>
                    </select>
                </div>
                <div class="form-row">
                    <label>地址详情:</label>
                    <textarea id="addressDetail" rows="3"></textarea>
                </div>
                <div class="form-row">
                    <label>通讯地址:</label>
                    <div class="radio-group">
                        <label class="radio-label"><input type="radio" name="isMailingAddress" value="Y"> 是</label>
                        <label class="radio-label"><input type="radio" name="isMailingAddress" value="N" checked> 否</label>
                    </div>
                </div>
                <div class="form-row">
                    <label>最新地址:</label>
                    <div class="radio-group">
                        <label class="radio-label"><input type="radio" name="isNewest" value="Y"> 是</label>
                        <label class="radio-label"><input type="radio" name="isNewest" value="N" checked> 否</label>
                    </div>
                </div>
                <div class="form-actions">
                    <button type="button" id="cancelBtn">取消</button>
                    <button type="submit">确定</button>
                </div>
            </form>
        </div>
    </div>
    <script>
// API 基础路径
const API_BASE = '';

// 状态变量
let currentClientNo = '';
let currentPage = 1;
let pageSize = 5;

// DOM 元素
const clientNoInput = document.getElementById('clientNoInput');
const queryBtn = document.getElementById('queryBtn');
const addBtn = document.getElementById('addBtn');
const addressTableBody = document.getElementById('addressTableBody');
const pageInfo = document.getElementById('pageInfo');
const prevBtn = document.getElementById('prevBtn');
const nextBtn = document.getElementById('nextBtn');
const addressModal = document.getElementById('addressModal');
const modalTitle = document.getElementById('modalTitle');
const addressForm = document.getElementById('addressForm');
const seqNoInput = document.getElementById('seqNo');
const addressTypeSelect = document.getElementById('addressType');
const addressDetailInput = document.getElementById('addressDetail');
const cancelBtn = document.getElementById('cancelBtn');
const pageSizeSelect = document.getElementById('pageSizeSelect');

// 调用查询接口
async function queryAddresses(clientNo, pageNum, pageSize, addressType) {
    const response = await fetch(API_BASE + '/client/address/query', {
        method: 'POST',
        headers: {
            'Content-Type': 'application/json'
        },
        body: JSON.stringify({
            clientNo: clientNo,
            pageNum: pageNum,
            pageSize: pageSize,
            addressType: addressType || null
        })
    });
    const result = await response.json();
    if (result.code !== '00000' && result.code !== '200') {
        throw new Error(result.message || '查询失败');
    }
    return result.data;
}

// 调用更新接口（批量）
async function updateAddresses(clientNo, addresses) {
    const response = await fetch(API_BASE + '/client/address/update', {
        method: 'POST',
        headers: {
            'Content-Type': 'application/json'
        },
        body: JSON.stringify({
            clientNo: clientNo,
            addresses: addresses
        })
    });
    const result = await response.json();
    if (result.code !== '00000' && result.code !== '200') {
        throw new Error(result.message || '更新失败');
    }
    return result.data;
}

// 调用单地址更新接口
async function updateSingleAddress(address) {
    const response = await fetch(API_BASE + '/client/address/single/update', {
        method: 'POST',
        headers: {
            'Content-Type': 'application/json'
        },
        body: JSON.stringify(address)
    });
    const result = await response.json();
    if (result.code !== '00000' && result.code !== '200') {
        throw new Error(result.message || '操作失败');
    }
    return result.data;
}

// 渲染地址列表
function renderAddressTable(addresses) {
    addressTableBody.innerHTML = '';
    if (!addresses || addresses.length === 0) {
        addressTableBody.innerHTML = '<tr><td colspan="7" style="text-align:center;">暂无数据</td></tr>';
        return;
    }
    addresses.forEach(addr => {
        const tr = document.createElement('tr');
        tr.innerHTML = `
            <td>${addr.seqNo || ''}</td>
            <td>${getAddressTypeName(addr.addressType)}</td>
            <td>${addr.addressDetail || ''}</td>
            <td>${addr.lastChangeDate || ''}</td>
            <td><span class="${addr.isMailingAddress === 'Y' ? 'flag-yes' : 'flag-no'}">${addr.isMailingAddress === 'Y' ? '√' : '×'}</span></td>
            <td><span class="${addr.isNewest === 'Y' ? 'flag-yes' : 'flag-no'}">${addr.isNewest === 'Y' ? '√' : '×'}</span></td>
            <td>
                <button class="editBtn" data-seqno="${addr.seqNo}">编辑</button>
                <button class="deleteBtn" data-seqno="${addr.seqNo}">删除</button>
            </td>
        `;
        addressTableBody.appendChild(tr);
    });
}

// 渲染分页信息
function renderPagination(total, currentPage, totalPages) {
    pageInfo.textContent = `共 ${total} 条  第 ${currentPage}/${totalPages || 1} 页`;
    prevBtn.disabled = currentPage <= 1;
    nextBtn.disabled = currentPage >= totalPages;
}

// 获取地址类型显示名称
function getAddressTypeName(typeCode) {
    const typeMap = {
        '01': '其他地址',
        '02': '联系地址',
        '03': '居住地址',
        '04': '单位地址',
        '05': '户籍地址',
        '06': '证件地址',
        '07': '营业地址',
        '08': '注册地址',
        '09': '办公地址',
        '10': '永久地址'
    };
    return typeMap[typeCode] || typeCode;
}

// 获取地址类型代码
function getAddressTypeCode(typeName) {
    const codeMap = {
        '其他地址': '01',
        '联系地址': '02',
        '居住地址': '03',
        '单位地址': '04',
        '户籍地址': '05',
        '证件地址': '06',
        '营业地址': '07',
        '注册地址': '08',
        '办公地址': '09',
        '永久地址': '10'
    };
    return codeMap[typeName] || typeName;
}

// 打开弹窗
function openModal(data) {
    if (data) {
        modalTitle.textContent = '编辑地址';
        seqNoInput.value = data.seqNo || '';
        addressTypeSelect.value = data.addressType || '03';
        addressDetailInput.value = data.addressDetail || '';
        document.querySelector('input[name="isMailingAddress"][value="' + (data.isMailingAddress === 'Y' ? 'Y' : 'N') + '"]').checked = true;
        document.querySelector('input[name="isNewest"][value="' + (data.isNewest === 'Y' ? 'Y' : 'N') + '"]').checked = true;
    } else {
        modalTitle.textContent = '新增地址';
        addressForm.reset();
        seqNoInput.value = '';
    }
    addressModal.style.display = 'flex';
}

// 关闭弹窗
function closeModal() {
    addressModal.style.display = 'none';
    addressForm.reset();
}

// 绑定事件
function bindEvents() {
    // 查询按钮
    queryBtn.addEventListener('click', async () => {
        const clientNo = clientNoInput.value.trim();
        if (!clientNo) {
            alert('请输入客户号');
            return;
        }
        currentClientNo = clientNo;
        currentPage = 1;
        try {
            const data = await queryAddresses(currentClientNo, currentPage, pageSize);
            renderAddressTable(data.list);
            renderPagination(data.total, currentPage, Math.ceil(data.total / pageSize));
        } catch (e) {
            alert(e.message);
        }
    });

    // 新增按钮
    addBtn.addEventListener('click', () => {
        openModal();
    });

    // 上一页
    prevBtn.addEventListener('click', async () => {
        if (currentPage <= 1) return;
        currentPage--;
        try {
            const data = await queryAddresses(currentClientNo, currentPage, pageSize);
            renderAddressTable(data.list);
            renderPagination(data.total, currentPage, Math.ceil(data.total / pageSize));
        } catch (e) {
            alert(e.message);
        }
    });

    // 下一页
    nextBtn.addEventListener('click', async () => {
        currentPage++;
        try {
            const data = await queryAddresses(currentClientNo, currentPage, pageSize);
            renderAddressTable(data.list);
            renderPagination(data.total, currentPage, Math.ceil(data.total / pageSize));
        } catch (e) {
            alert(e.message);
        }
    });

    // 表格操作按钮（编辑、删除）
    addressTableBody.addEventListener('click', async (e) => {
        const target = e.target;
        const seqNo = target.dataset.seqno;

        if (target.classList.contains('editBtn')) {
            // 获取当前行数据并打开编辑弹窗
            const row = target.closest('tr');
            const cells = row.cells;
            openModal({
                seqNo: cells[0].textContent,
                addressType: getAddressTypeCode(cells[1].textContent),
                addressDetail: cells[2].textContent,
                isMailingAddress: cells[4].textContent.includes('√') ? 'Y' : 'N',
                isNewest: cells[5].textContent.includes('√') ? 'Y' : 'N'
            });
        }

        if (target.classList.contains('deleteBtn')) {
            if (!confirm('确定删除该地址？')) return;
            try {
                await updateSingleAddress({
                    seqNo: seqNo,
                    clientNo: currentClientNo,
                    delFlag: 'Y'
                });
                alert('删除成功');
                // 刷新列表
                const data = await queryAddresses(currentClientNo, currentPage, pageSize);
                renderAddressTable(data.list);
                renderPagination(data.total, currentPage, Math.ceil(data.total / pageSize));
            } catch (e) {
                alert(e.message);
            }
        }
    });

    // 取消按钮
    cancelBtn.addEventListener('click', closeModal);

    // 每页条数切换
    pageSizeSelect.addEventListener('change', async () => {
        pageSize = parseInt(pageSizeSelect.value);
        currentPage = 1;
        try {
            const data = await queryAddresses(currentClientNo, currentPage, pageSize);
            renderAddressTable(data.list);
            renderPagination(data.total, currentPage, Math.ceil(data.total / pageSize));
        } catch (e) {
            alert(e.message);
        }
    });

    // 表单提交
    addressForm.addEventListener('submit', async (e) => {
        e.preventDefault();
        const address = {
            seqNo: seqNoInput.value || null,
            clientNo: currentClientNo,
            addressType: addressTypeSelect.value,
            addressDetail: addressDetailInput.value,
            isMailingAddress: document.querySelector('input[name="isMailingAddress"]:checked').value,
            isNewest: document.querySelector('input[name="isNewest"]:checked').value,
            delFlag: 'N'
        };
        try {
            await updateSingleAddress(address);
            alert('保存成功');
            closeModal();
            // 刷新列表
            const data = await queryAddresses(currentClientNo, currentPage, pageSize);
            renderAddressTable(data.list);
            renderPagination(data.total, currentPage, Math.ceil(data.total / pageSize));
        } catch (e) {
            alert(e.message);
        }
    });
}

// 页面加载完成后绑定事件
document.addEventListener('DOMContentLoaded', bindEvents);
    </script>
</body>
</html>
